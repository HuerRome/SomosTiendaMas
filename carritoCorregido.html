<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TiendaMas</title>

  <!-- Tailwind (UNA sola vez) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-orange': '#FF6B35',
            'dark-blue': '#004E89'
          }
        }
      }
    }
  </script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100">

<!-- HEADER SIMPLE (reducido limpio) -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="font-bold text-xl text-dark-blue">TiendaMas</h1>

  <button id="btn-mobile" class="lg:hidden">
    <i id="icon-open" class="fa fa-bars"></i>
    <i id="icon-close" class="fa fa-times hidden"></i>
  </button>
</header>

<div id="mobile-menu" class="hidden bg-white p-4">
  <a href="#" class="block py-2">Carrito</a>
  <a href="#" class="block py-2">Categorías</a>
</div>

<!-- MAIN -->
<main class="container mx-auto p-6 flex flex-col lg:flex-row gap-6">

  <!-- CART -->
  <section class="lg:w-2/3">

    <div class="bg-white p-4 rounded shadow mb-4">
      <h2 class="font-bold text-lg">Tu carrito</h2>
    </div>

    <!-- EMPTY -->
    <div id="empty-cart-message" class="hidden bg-white p-6 text-center rounded shadow">
      <p>Carrito vacío</p>
    </div>

    <!-- ITEMS -->
    <div id="cart-items" class="bg-white rounded shadow">

      <!-- ITEM -->
      <div class="cart-item p-4 border-b" data-price="12999">
        <div class="flex justify-between">
          <h3>Smartphone</h3>
          <button class="remove-item text-red-500">X</button>
        </div>

        <div class="flex justify-between mt-4">
          <span>$<span class="unit-price">12999</span></span>

          <div class="flex">
            <button class="decrement-qty px-2">-</button>
            <input type="number" value="1" min="1" class="quantity w-10 text-center">
            <button class="increment-qty px-2">+</button>
          </div>

          <span>$<span class="subtotal">12999</span></span>
        </div>
      </div>

    </div>

  </section>

  <!-- SUMMARY -->
  <aside class="lg:w-1/3">
    <div class="bg-white p-6 rounded shadow sticky top-4">

      <h2 class="font-bold mb-4">Resumen</h2>

      <div class="flex justify-between">
        <span data-summary-label>Subtotal (0 productos)</span>
        <span>$<span id="subtotal-amount">0</span></span>
      </div>

      <div class="flex justify-between">
        <span>Impuestos</span>
        <span>$<span id="tax-amount">0</span></span>
      </div>

      <div class="flex justify-between font-bold mt-3">
        <span>Total</span>
        <span>$<span id="total-amount">0</span></span>
      </div>

    </div>
  </aside>

</main>

<!-- ================= JS ================= -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  const cartContainer = document.getElementById('cart-items');
  const emptyMessage = document.getElementById('empty-cart-message');

  const formatCurrency = (n) =>
    new Intl.NumberFormat('es-AR').format(n);

  const getItems = () =>
    document.querySelectorAll('.cart-item');

  const updateTotals = () => {
    let subtotal = 0;
    let count = 0;

    getItems().forEach(item => {
      const price = Number(item.dataset.price);
      const qty = Number(item.querySelector('.quantity').value);

      subtotal += price * qty;
      count += qty;
    });

    const tax = Math.round(subtotal * 0.1);

    document.getElementById('subtotal-amount').textContent = formatCurrency(subtotal);
    document.getElementById('tax-amount').textContent = formatCurrency(tax);
    document.getElementById('total-amount').textContent = formatCurrency(subtotal + tax);

    document.querySelector('[data-summary-label]').textContent =
      `Subtotal (${count} ${count === 1 ? 'producto' : 'productos'})`;

    if (count === 0) {
      emptyMessage.classList.remove('hidden');
      cartContainer.classList.add('hidden');
    } else {
      emptyMessage.classList.add('hidden');
      cartContainer.classList.remove('hidden');
    }
  };

  const updateItem = (item) => {
    const price = Number(item.dataset.price);
    const qty = Number(item.querySelector('.quantity').value);

    item.querySelector('.subtotal').textContent =
      formatCurrency(price * qty);
  };

  // 🔥 EVENT DELEGATION
  cartContainer.addEventListener('click', (e) => {
    const item = e.target.closest('.cart-item');
    if (!item) return;

    const input = item.querySelector('.quantity');

    if (e.target.closest('.increment-qty')) {
      input.value++;
    }

    if (e.target.closest('.decrement-qty')) {
      if (input.value > 1) input.value--;
    }

    if (e.target.closest('.remove-item')) {
      item.remove();
    }

    updateItem(item);
    updateTotals();
  });

  cartContainer.addEventListener('change', (e) => {
    if (e.target.classList.contains('quantity')) {
      if (e.target.value < 1) e.target.value = 1;

      const item = e.target.closest('.cart-item');
      updateItem(item);
      updateTotals();
    }
  });

  updateTotals();
});

// MOBILE MENU FIX
const btn = document.getElementById('btn-mobile');
const menu = document.getElementById('mobile-menu');
const openIcon = document.getElementById('icon-open');
const closeIcon = document.getElementById('icon-close');

btn.addEventListener('click', () => {
  menu.classList.toggle('hidden');
  openIcon.classList.toggle('hidden');
  closeIcon.classList.toggle('hidden');
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerrar sesión</title>
  <link rel="stylesheet" href="../css/panel de usuario/logOut.css">
</head>
<body>

<!-- BOTÓN VOLVER (FIJO ARRIBA IZQ) -->
<a href="javascript:history.back()" class="back-btn">← Volver</a>

<!-- OVERLAY + MODAL -->
<div class="logout-wrapper">

  <div class="modal">
    <button class="close-btn" id="closeBtn">✕</button>

    <h2>¿Querés salir de tu cuenta?</h2>

    <div class="actions">
      <button class="btn-outline" id="cancelBtn">CANCELAR</button>
      <button class="btn-primary" id="logoutBtn">SALIR</button>
    </div>
  </div>

</div>

<script src="../Javascript/panel de usuario/logOut.js"></script>
</body>
</html>
